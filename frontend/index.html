<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disha - AI Health Coach</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="chat-container">
        <!-- Header -->
        <header class="chat-header">
            <div class="header-info">
                <div class="avatar">
                    <img src="https://ui-avatars.com/api/?name=Disha&background=0D8ABC&color=fff" alt="Disha AI">
                </div>
                <div>
                    <h1>Disha</h1>
                    <span class="status-indicator">AI Health Coach</span>
                </div>
            </div>
            <div class="session-info">
                Session: <span id="session-display">...</span>
            </div>
        </header>

        <!-- Message Area -->
        <main class="chat-messages" id="chat-messages">
            <!-- Loading indicator for history -->
            <div class="history-loader" id="history-loader" style="display: none;">
                Loading older messages...
            </div>
            
            <div class="messages-wrapper" id="messages-wrapper">
                <!-- Messages will be injected here -->
            </div>
            
            <!-- Typing Indicator -->
            <div class="typing-indicator" id="typing-indicator" style="display: none;">
                <div class="bubble ai-bubble">
                    <div class="typing-dots">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            </div>
        </main>

        <!-- Input Area -->
        <footer class="chat-footer">
            <form id="chat-form">
                <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" required>
                <button type="submit" id="send-button">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="css-i6dzq1"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </footer>
    </div>
    
    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
